name: Compress JPG/PNG with Adaptive Compression

on:
  push:
    paths:
      - 'img/unzip/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-jpegoptim-optipng

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim optipng

      - name: Process JPG/PNG with size-based compression
        run: |
          mkdir -p img

          find img/unzip -type f | while read file; do
            filename=$(basename "$file")
            extension="${filename##*.}"
            ext_lower=$(echo "$extension" | tr '[:upper:]' '[:lower:]')

            size_bytes=$(stat -c%s "$file")
            size_mb=$(echo "scale=2; $size_bytes / 1048576" | bc)
            echo "File: $file, Size: ${size_mb} MB"

            case "$ext_lower" in
              jpg|jpeg)
                output="img/${filename%.*}.jpg"
                # 根据大小选择 JPEG 质量
                if (( $(echo "$size_mb > 15" | bc -l) )); then
                  quality=65
                  echo "Large JPEG (>15MB) → quality $quality"
                elif (( $(echo "$size_mb > 8" | bc -l) )); then
                  quality=75
                  echo "Medium JPEG (8-15MB) → quality $quality"
                elif (( $(echo "$size_mb > 3" | bc -l) )); then
                  quality=85
                  echo "Normal JPEG (3-8MB) → quality $quality"
                else
                  quality=90
                  echo "Small JPEG (≤3MB) → quality $quality (copy without recompress?)"
                fi
                # 只有 >3MB 才压缩，否则直接复制
                if (( $(echo "$size_mb > 3" | bc -l) )); then
                  jpegoptim --strip-all --all-progressive -m "$quality" "$file" --dest="img/"
                else
                  cp "$file" "$output"
                fi
                ;;
              png)
                output="img/$filename"
                # PNG 根据大小选择优化级别（级别越高越慢但压缩率更高）
                if (( $(echo "$size_mb > 15" | bc -l) )); then
                  level=7
                  echo "Large PNG (>15MB) → optipng -o$level (very slow)"
                elif (( $(echo "$size_mb > 8" | bc -l) )); then
                  level=5
                  echo "Medium PNG (8-15MB) → optipng -o$level"
                elif (( $(echo "$size_mb > 3" | bc -l) )); then
                  level=3
                  echo "Normal PNG (3-8MB) → optipng -o$level"
                else
                  level=2
                  echo "Small PNG (≤3MB) → optipng -o$level (copy without recompress?)"
                fi
                if (( $(echo "$size_mb > 3" | bc -l) )); then
                  optipng -o"$level" -out "$output" "$file"
                else
                  cp "$file" "$output"
                fi
                ;;
              *)
                echo "Skipping non-JPG/PNG: $file"
                continue
                ;;
            esac

            if [ -f "$output" ]; then
              rm -f "$file"
              echo "Deleted original: $file"
            else
              echo "Processing failed for $file, keeping original"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/ img/unzip/
          git commit -m "Adaptive compress JPG/PNG by size" || echo "No changes to commit"
          git push
