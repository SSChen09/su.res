name: Compress JPG/PNG and Delete Originals

on:
  push:
    paths:
      - 'img/unzip/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim optipng

      - name: Compress JPG/PNG from img/unzip to img/ and delete originals
        run: |
          mkdir -p img

          find img/unzip -type f | while read file; do
            filename=$(basename "$file")
            extension="${filename##*.}"
            ext_lower=$(echo "$extension" | tr '[:upper:]' '[:lower:]')

            case "$ext_lower" in
              jpg|jpeg)
                output="img/${filename%.*}.jpg"
                echo "Processing JPEG: $file -> $output"
                # --strip-all 去除元数据, -m 90 质量90%, --dest 指定输出目录
                jpegoptim --strip-all --all-progressive -m 90 "$file" --dest="img/"
                ;;
              png)
                output="img/$filename"
                echo "Processing PNG: $file -> $output"
                optipng -o2 -out "$output" "$file"
                ;;
              *)
                echo "Skipping non-JPG/PNG: $file"
                continue
                ;;
            esac

            # 压缩成功后删除原始文件
            if [ -f "$output" ]; then
              rm -f "$file"
              echo "Deleted original: $file"
            else
              echo "Compression failed for $file, keeping original"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/ img/unzip/
          git commit -m "Auto compress JPG/PNG and delete originals" || echo "No changes to commit"
          git push
