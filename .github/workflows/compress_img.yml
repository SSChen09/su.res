name: Compress JPG/PNG (>3MB) with Apt Cache

on:
  push:
    paths:
      - 'img/unzip/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 缓存 apt 包（deb 文件）
      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-jpegoptim-optipng
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install compression tools
        # 只有当缓存未命中时才真正执行安装（但即使命中，install 命令也会瞬间完成）
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim optipng

      - name: Process JPG/PNG from img/unzip to img/ (compress if >3MB)
        run: |
          mkdir -p img

          find img/unzip -type f | while read file; do
            filename=$(basename "$file")
            extension="${filename##*.}"
            ext_lower=$(echo "$extension" | tr '[:upper:]' '[:lower:]')

            size_bytes=$(stat -c%s "$file")
            size_mb=$(echo "scale=2; $size_bytes / 1048576" | bc)
            echo "File: $file, Size: ${size_mb} MB"

            case "$ext_lower" in
              jpg|jpeg)
                output="img/${filename%.*}.jpg"
                if (( $(echo "$size_mb > 3" | bc -l) )); then
                  echo "Compressing JPEG (size > 3MB)"
                  jpegoptim --strip-all --all-progressive -m 90 "$file" --dest="img/"
                else
                  echo "Copying JPEG without compression (size <= 3MB)"
                  cp "$file" "$output"
                fi
                ;;
              png)
                output="img/$filename"
                if (( $(echo "$size_mb > 3" | bc -l) )); then
                  echo "Compressing PNG (size > 3MB)"
                  optipng -o2 -out "$output" "$file"
                else
                  echo "Copying PNG without compression (size <= 3MB)"
                  cp "$file" "$output"
                fi
                ;;
              *)
                echo "Skipping non-JPG/PNG: $file"
                continue
                ;;
            esac

            if [ -f "$output" ]; then
              rm -f "$file"
              echo "Deleted original: $file"
            else
              echo "Processing failed for $file, keeping original"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/ img/unzip/
          git commit -m "Auto process JPG/PNG: compress if >3MB (cached apt)" || echo "No changes to commit"
          git push
